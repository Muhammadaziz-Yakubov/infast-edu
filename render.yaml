services:
  - type: web
    name: infast-backend
    env: node
    region: oregon
    rootDir: backend
    buildCommand: npm install && npm run build && python -m venv AIAGENT/.venv && AIAGENT/.venv/bin/pip install -r AIAGENT/src/telegram/requirements.txt
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: "*"
    autoDeploy: true
